<!-- Web Server Configuration (nginx example) -->
server {
    listen 80;
    listen [::]:80;
    server_name team-mrc.com www.team-mrc.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name team-mrc.com www.team-mrc.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/team-mrc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/team-mrc.com/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:256m;
    ssl_session_timeout 4h;

    # Root directory
    root /var/www/team-mrc;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # Caching Strategy
    # Static assets - 1 year
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML - No cache (always check for updates)
    location ~* \.html?$ {
        expires -1;
        add_header Cache-Control "public, must-revalidate";
    }

    # Media files - 30 days
    location ~* \.(mp4|webm|ogv|mov)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Default cache for everything else
    location / {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";

        # Single Page App fallback
        try_files $uri $uri/ /index.html;
    }

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;
    gzip_disable "MSIE [1-6]\.(?!.*SV1)";

    # Brotli Compression (if available)
    brotli on;
    brotli_types text/plain text/css text/xml text/javascript 
                 application/x-javascript application/xml+rss 
                 application/javascript application/json;

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /error.html;

    # Disable access to hidden files
    location ~ /\. {
        deny all;
    }

    # Disable access to backup files
    location ~ \.php$ {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/team-mrc-access.log;
    error_log /var/log/nginx/team-mrc-error.log;
}
